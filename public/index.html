<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Moneybot2 Agent</title>
    <style>
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        margin: 16px;
        background: #0b1020;
        color: #e8eefc;
      }
      h2 {
        font-size: 14px;
        font-weight: 600;
        margin: 0 0 8px 0;
        opacity: 0.9;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
      }
      button {
        background: #2b6cff;
        color: #fff;
        border: 0;
        padding: 10px 14px;
        border-radius: 10px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        align-items: start;
      }
      @media (max-width: 960px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }
      .panel {
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        padding: 12px;
        background: rgba(255, 255, 255, 0.03);
      }
      .hint {
        font-size: 13px;
        opacity: 0.85;
        margin-bottom: 10px;
        line-height: 1.45;
      }
      #vncFrame {
        width: 100%;
        height: min(68vh, 780px);
        border: 0;
        border-radius: 8px;
        background: #000;
      }
      #log {
        height: min(68vh, 780px);
        overflow: auto;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 8px;
        padding: 8px;
      }
      .entry {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 12px;
        padding: 8px 10px;
        border-radius: 10px;
        margin-bottom: 10px;
        background: rgba(255, 255, 255, 0.04);
      }
      .meta {
        opacity: 0.8;
        margin-bottom: 4px;
      }
      .type {
        font-weight: 700;
      }
      a.open-tab {
        color: #7eb8ff;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div>Microworkers agent — live desktop + event log</div>
      <div style="flex: 1"></div>
      <button id="resumeBtn" type="button" disabled>Resume</button>
    </div>

    <div class="layout">
      <div class="panel">
        <h2>Live browser</h2>
        <p class="hint" id="vncHint">Checking whether noVNC is available…</p>
        <a class="open-tab" id="vncOpenTab" href="#" style="display: none" target="_blank" rel="noopener">Open desktop in new tab</a>
        <iframe id="vncFrame" title="noVNC" style="display: none"></iframe>
      </div>
      <div class="panel">
        <h2>Event stream</h2>
        <div id="log"></div>
      </div>
    </div>

    <script>
      const logEl = document.getElementById("log");
      const resumeBtn = document.getElementById("resumeBtn");
      const vncHint = document.getElementById("vncHint");
      const vncFrame = document.getElementById("vncFrame");
      const vncOpenTab = document.getElementById("vncOpenTab");

      fetch("/vnc-status")
        .then((r) => r.json())
        .then((s) => {
          if (s.enabled && s.viewerPath) {
            vncHint.textContent =
              "This is the real Chromium session the bot uses (when ENABLE_VNC=true on the server). Use it to complete Cloudflare, captchas, or manual login.";
            vncFrame.src = s.viewerPath;
            vncFrame.style.display = "block";
            vncOpenTab.href = s.viewerPath;
            vncOpenTab.style.display = "inline-block";
          } else {
            vncHint.innerHTML =
              "<strong>Live desktop is off.</strong> On Railway add <code>ENABLE_VNC=true</code>, redeploy, then reload this page. Without it you only get the text log (Railway exposes one public port — the desktop is proxied here at <code>/novnc/</code>).";
          }
        })
        .catch(() => {
          vncHint.textContent = "Could not load /vnc-status — check that the server is running.";
        });

      function addEntry(event) {
        const div = document.createElement("div");
        div.className = "entry";

        const ts = new Date().toISOString();
        const type = event?.type || "EVENT";
        const label = event?.label || "";

        div.innerHTML = `
          <div class="meta">
            <span class="type">${type}</span> <span>${ts}</span>
          </div>
          <div>${escapeHtml(label)}</div>
        `;

        logEl.appendChild(div);
        logEl.scrollTop = logEl.scrollHeight;
      }

      function escapeHtml(s) {
        return String(s ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function setResumeEnabled(canResume) {
        resumeBtn.disabled = !canResume;
        resumeBtn.title = canResume
          ? "Send resume to the automation (after manual login or captcha)."
          : "Resume is only needed when the agent is paused (MANUAL_PAUSE in the log).";
      }

      async function syncPauseFromServer() {
        try {
          const r = await fetch("/pause-status");
          if (!r.ok) return;
          const s = await r.json();
          setResumeEnabled(Boolean(s.awaitingResume));
        } catch {
          // keep current state
        }
      }

      syncPauseFromServer();

      const es = new EventSource("/events");
      es.onmessage = (m) => {
        let payload;
        try {
          payload = JSON.parse(m.data);
        } catch {
          payload = { type: "PARSE_ERROR", label: m.data };
        }
        addEntry(payload);

        if (payload?.type === "CONNECTED") {
          syncPauseFromServer();
          return;
        }
        if (payload?.type === "MANUAL_PAUSE") {
          setResumeEnabled(true);
          return;
        }
        if (payload?.type === "MANUAL_RESUME") {
          setResumeEnabled(false);
        }
      };
      es.onerror = () => {
        addEntry({ type: "SSE_ERROR", label: "Disconnected from event stream. Check server logs and reload." });
        syncPauseFromServer();
      };

      resumeBtn.addEventListener("click", async () => {
        try {
          const r = await fetch("/resume", { method: "POST", headers: { "Content-Type": "application/json" }, body: "{}" });
          const data = r.ok ? await r.json().catch(() => ({})) : {};
          setResumeEnabled(Boolean(data.awaitingResume));
          if (!r.ok) addEntry({ type: "RESUME_HTTP_ERROR", label: `POST /resume failed (${r.status})` });
        } catch (e) {
          addEntry({ type: "RESUME_ERROR", label: String(e?.message || e) });
          await syncPauseFromServer();
        }
      });
    </script>
  </body>
</html>
